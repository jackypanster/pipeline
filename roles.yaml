# roles.yaml — per-target-repo skill bindings (copy this into the target repo's .pipeline/)
# Each command resolves its slot to a skill NAME here. Point a slot at a better skill any time —
# the contract is unchanged. The runtime is chosen by WHICH bot you paste the command into
# (think/check/grill-* run in Claude Code; goal runs on a Hermes profile).

prd:    [grill-me, think]   # grill-me clarifies the rough idea, then think produces the plan
arch:   grill-with-docs     # walks the design tree against the codebase; emits CONTEXT.md + ADRs
task:   think               # decomposes into atomic cards (the agent writes the red tests)
impl:   goal                # think → design tests → code → check loop
review: check               # semantic review of the diff/PR
hunt:   hunt                # root-cause a blocked card before re-queue

# Extend with new verbs as needed, e.g.:
# learn:  learn             # research an unfamiliar external dependency before arch
# deploy: <your-deploy-skill>
